# tls-ingressroute.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "hello-world.fullname" . }}
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`hello.bieringer.dev`)
      kind: Rule
      services:
        - name: {{ include "hello-world.fullname" . }}
          port: 80
  tls:
    secretName: {{ include "hello-world.fullname" . }}