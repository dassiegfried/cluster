# tls-ingressroute.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: secure-app
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hello.cluster.local`)
      kind: Rule
      services:
        - name: hello-world
          port: 80
  tls:
    secretName: hello-tls
    options:
      name: default
      namespace: traefik